<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>用得上 · 把收藏变成行动</title>
<!-- 真实 API key 外置在 config.local.js（已 .gitignore，不进仓库）。没有这个文件时 H5 自动走本地兜底、照常演示。 -->
<script src="config.local.js"></script>
<!-- 离线二维码库：现场局域网扫码用，纯本地生成、无需外网 -->
<script src="qrcode.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --bg:#f8f3ea; --panel:#fffdf8; --card:#ffffff; --text:#2b2118; --muted:#7a6a5a;
    --line:#eadfce; --soft:#f4eadb; --orange:#d97706; --orange2:#f59e0b; --red:#fe2c55;
    --shadow:0 14px 40px rgba(92,64,34,.12); --shadow2:0 8px 22px rgba(217,119,6,.24);
  }
  body { min-height:100vh; background:linear-gradient(180deg,#fbf6ee 0%,#efe1cf 100%); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif; display:flex; justify-content:center; color:var(--text); }
  .phone { width:100%; max-width:420px; min-height:100vh; background:var(--bg); color:var(--text); position:relative; overflow-x:hidden; box-shadow:0 0 0 1px rgba(120,85,45,.08); }
  .topbar { padding:18px 18px 12px; position:sticky; top:0; background:rgba(248,243,234,.88); backdrop-filter:blur(18px); z-index:10; border-bottom:1px solid rgba(232,222,210,.55); }
  .topbar h1 { font-size:21px; letter-spacing:-.03em; font-weight:800; }
  .topbar h1 span{ color:var(--orange); }
  .topbar .sub { font-size:12px; color:var(--muted); margin-top:4px; }
  .view { display:none; padding:10px 14px 180px; } .view.active { display:block; animation:rise .28s ease both; }
  @keyframes rise { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
  .group-title { font-size:13px; color:var(--muted); margin:17px 4px 9px; display:flex; align-items:center; gap:6px; font-weight:700;}
  .group-title.hot { color:var(--orange); }
  .card { background:var(--card); border:1px solid rgba(232,222,210,.9); border-radius:18px; padding:13px 14px; margin-bottom:10px; display:flex; gap:12px; align-items:center; box-shadow:0 8px 20px rgba(92,64,34,.06); }
  .card.hot-card { border-color:rgba(245,158,11,.45); background:linear-gradient(180deg,#fffdf8,#fff9ef); }
  .thumb { width:54px; height:54px; border-radius:14px; background:radial-gradient(circle at 32% 26%,#fff4e0,#f0d6ad); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:"Songti SC","STSong","SimSun",serif; font-size:27px; font-weight:700; color:#a9692a; box-shadow:inset 0 0 0 1px rgba(169,105,42,.22);}
  .hot-card .thumb{ color:#b45309; background:radial-gradient(circle at 32% 26%,#ffe6bf,#eec188); box-shadow:inset 0 0 0 1px rgba(180,83,9,.32);}
  .card .meta { flex:1; min-width:0; }
  .card .t { font-size:14px; line-height:1.35; margin-bottom:4px; font-weight:650; color:var(--text); }
  .card .m { font-size:11px; color:var(--muted); }
  .card .why { font-size:11px; color:var(--orange); margin-top:5px; opacity:.95; line-height:1.35;}
  .fab { position:fixed; bottom:calc(22px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); width:calc(100% - 56px); max-width:360px; background:linear-gradient(135deg,var(--orange),var(--orange2)); color:#fff; border:none; padding:15px; border-radius:999px; font-size:16px; font-weight:800; box-shadow:var(--shadow2); z-index:20;}
  .signal-wrap { padding:28px 14px 110px; }
  .bubble { background:rgba(255,255,255,.86); border-radius:26px; padding:18px; border:1px solid rgba(232,222,210,.95); box-shadow:var(--shadow); position:relative; overflow:hidden;}
  .bubble:before{content:""; position:absolute; inset:0 0 auto; height:4px; background:linear-gradient(90deg,var(--orange),#ffd08a,var(--red));}
  .bubble .who{ font-size:12px; color:var(--orange); margin-bottom:10px; display:flex; align-items:center; gap:6px; font-weight:800;}
  .bubble .msg{ font-size:17px; line-height:1.58; font-weight:650; letter-spacing:-.01em; }
  .bubble .ev{ font-size:12px; color:var(--muted); margin-top:12px; background:#fff7ea; border:1px solid #f0dfc8; padding:10px 11px; border-radius:14px; line-height:1.45;}
  .actions{ display:flex; gap:10px; margin-top:16px;}
  .actions button{ flex:1; padding:13px; border-radius:999px; border:none; font-size:15px; font-weight:800;}
  .btn-primary{ background:linear-gradient(135deg,var(--orange),var(--orange2)); color:#fff; box-shadow:0 8px 18px rgba(217,119,6,.22);} .btn-ghost{ background:#f0e5d5; color:#6b5947;}
  .deliv-head{ padding:8px 4px 14px;} .deliv-head .title{ font-size:22px; font-weight:850; letter-spacing:-.04em;}
  .deliv-head .based{ font-size:12px; color:var(--muted); margin-top:7px; line-height:1.55;}
  .day { background:var(--card); border:1px solid rgba(232,222,210,.95); border-radius:19px; padding:14px 15px; margin-bottom:11px; box-shadow:0 8px 22px rgba(92,64,34,.07); }
  .day .d{ font-size:12px; color:var(--orange); font-weight:850; } .day .th{ font-size:16px; margin:4px 0 7px; font-weight:800;}
  .day .task{ font-size:13px; color:#4c3d30; line-height:1.48; white-space:pre-line; }
  .day-output-top{font-size:13px; color:#2f241b; line-height:1.45; background:linear-gradient(180deg,#fff7ea,#f9efe0); border:1px solid #eddec8; border-radius:15px; padding:10px 11px; margin:9px 0 9px; font-weight:800;}
  .day-output-top span{display:block; font-size:11px; color:var(--orange); margin-bottom:3px; font-weight:900;}
  .day details{margin-top:8px; border-top:1px dashed #eadfce; padding-top:8px;}
  .day summary{cursor:pointer; list-style:none; color:#8a560b; font-size:12px; font-weight:900;}
  .day summary::-webkit-details-marker{display:none;}
  .plan-overview{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:4px 0 12px;}
  .overview-chip{border:1px solid #efd9ba; background:#fff8ed; border-radius:16px; padding:9px 8px; text-align:left; color:#5b3d16; box-shadow:0 6px 14px rgba(92,64,34,.06);}
  .overview-chip b{display:block; color:var(--orange); font-size:11px; margin-bottom:4px;}
  .overview-chip span{display:block; font-size:12px; line-height:1.28; font-weight:850;}
  .why-card{background:#fffdf8; border:1px solid rgba(232,222,210,.95); border-radius:18px; padding:13px 14px; margin:0 0 12px; box-shadow:0 8px 20px rgba(92,64,34,.06);}
  .why-card .why-title{font-size:13px; font-weight:950; color:#3f2d1c; margin-bottom:7px;}
  .why-card .why-copy{font-size:12px; line-height:1.55; color:var(--muted);}
  .why-card .why-metrics{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px;}
  .why-card .why-metrics span{font-size:11px; color:#8a560b; background:#fff7ea; border:1px solid #f0dfc8; border-radius:999px; padding:5px 8px; font-weight:800;}
  .points{ list-style:none; display:grid; gap:7px; margin:8px 0 2px; }
  .points li{ position:relative; padding-left:17px; font-size:13px; color:#4c3d30; line-height:1.48; }
  .points li:before{ content:"•"; position:absolute; left:2px; top:-1px; color:var(--orange); font-size:18px; line-height:1; }
  .day .from{ font-size:11px; color:var(--muted); margin-top:9px; line-height:1.4; background:#faf3e8; padding:7px 9px; border-radius:11px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .source-tag{ border:1px solid #efd9ba; background:#fff8ed; color:#8a560b; border-radius:999px; padding:5px 8px; font-size:11px; font-weight:800; cursor:pointer; max-width:100%; }
  .source-tag:active{ transform:scale(.97); }
  .card.focused,.day.focused{ outline:2px solid rgba(217,119,6,.65); box-shadow:0 0 0 5px rgba(217,119,6,.13), 0 8px 20px rgba(92,64,34,.06); }
  .stream-panel{ padding:18px 2px 26px; }
  .typing-bubble{ background:rgba(255,255,255,.88); border:1px solid rgba(232,222,210,.95); border-radius:22px; padding:15px; margin-bottom:13px; box-shadow:var(--shadow); }
  .typing-bubble .who{ font-size:12px; color:var(--orange); font-weight:850; margin-bottom:8px; }
  .typing-bubble .text{ font-size:14px; color:#4c3d30; line-height:1.58; min-height:44px; white-space:pre-line; }
  .typing-bubble .cursor{ display:inline-block; width:7px; height:15px; margin-left:2px; background:var(--orange); vertical-align:-2px; animation:blink .9s steps(2,end) infinite; }
  .skeleton-card{ background:var(--card); border:1px solid rgba(232,222,210,.95); border-radius:19px; padding:14px 15px; margin-bottom:11px; box-shadow:0 8px 22px rgba(92,64,34,.07); overflow:hidden; }
  .sk-line{ height:10px; border-radius:999px; margin:9px 0; background:linear-gradient(90deg,#f3e7d7 0%,#fff7ea 45%,#f3e7d7 90%); background-size:220% 100%; animation:shimmer 1.1s linear infinite; }
  .sk-line.short{ width:38%; } .sk-line.mid{ width:66%; } .sk-line.long{ width:92%; }
  @keyframes blink{ 50%{ opacity:0; } }
  @keyframes shimmer{ from{ background-position:120% 0; } to{ background-position:-120% 0; } }
  .adjust { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:420px; background:rgba(255,253,248,.94); backdrop-filter:blur(18px); padding:12px 14px calc(12px + env(safe-area-inset-bottom)); display:flex; gap:8px; border-top:1px solid rgba(232,222,210,.95); z-index:25;}
  .adjust input{ flex:1; background:#fff; border:1px solid var(--line); border-radius:999px; padding:12px 14px; color:var(--text); font-size:14px; outline:none;}
  .adjust input:focus{border-color:rgba(217,119,6,.55); box-shadow:0 0 0 4px rgba(217,119,6,.10);}
  .adjust button{ background:linear-gradient(135deg,var(--orange),var(--orange2)); border:none; color:#fff; border-radius:999px; padding:0 18px; font-weight:850; min-width:54px;}
  .adjust button:disabled{background:#e8dccb; color:#9b8a78; box-shadow:none;}
  .primary-cta{margin:14px 0 12px; display:flex; gap:9px;}
  .primary-cta button{flex:1; border:none; border-radius:18px; padding:14px 12px; font-size:15px; font-weight:900; box-shadow:0 10px 24px rgba(217,119,6,.16);}
  .primary-cta .start{background:linear-gradient(135deg,var(--orange),var(--orange2)); color:#fff;}
  .primary-cta .save{background:#fff7ea; color:#8a560b; border:1px solid #efd9ba; box-shadow:0 8px 18px rgba(92,64,34,.08);}
  .toast{position:fixed; left:50%; bottom:calc(132px + env(safe-area-inset-bottom)); transform:translateX(-50%); z-index:55; max-width:360px; width:calc(100% - 44px); background:rgba(43,33,24,.90); color:#fff; border-radius:16px; padding:11px 13px; font-size:13px; line-height:1.42; box-shadow:0 16px 34px rgba(43,33,24,.22); display:none;}
  .toast.show{display:block; animation:rise .2s ease both;}
  .adjusted-badge{display:inline-flex; align-items:center; gap:5px; margin:0 0 10px; padding:7px 10px; border-radius:999px; background:#ecfdf3; border:1px solid #bbf7d0; color:#16703a; font-size:12px; font-weight:850;}
  .day.adjusted-highlight{border-color:rgba(34,197,94,.45); box-shadow:0 10px 24px rgba(34,197,94,.10);}
  .loading{ text-align:center; color:var(--muted); padding:42px 24px; font-size:14px; line-height:1.7;}
  .loading:before{content:""; display:block; width:36px; height:36px; margin:0 auto 14px; border-radius:50%; border:3px solid #efdcc2; border-top-color:var(--orange); animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .hero { background:linear-gradient(180deg,#fffdf8,#fff7ea); border:1px solid rgba(232,222,210,.95); border-radius:24px; padding:18px 16px; margin:8px 0 14px; box-shadow:var(--shadow); overflow:hidden; position:relative; }
  .hero:after{content:""; position:absolute; width:160px; height:160px; right:-72px; top:-80px; border-radius:50%; background:rgba(245,158,11,.16); filter:blur(2px);}
  .eyebrow{font-size:11px; color:var(--orange); font-weight:850; letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px;}
  .hero-title{font-size:23px; line-height:1.12; letter-spacing:-.055em; font-weight:900; max-width:280px;}
  .hero-copy{font-size:12px; line-height:1.55; color:var(--muted); margin-top:9px; max-width:310px;}
  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:14px; position:relative; z-index:1;}
  .stat{background:rgba(255,255,255,.68); border:1px solid rgba(232,222,210,.85); border-radius:16px; padding:10px 9px;}
  .stat strong{display:block; font-size:18px; letter-spacing:-.04em; color:var(--text);}
  .stat span{font-size:10px; color:var(--muted); white-space:nowrap;}
  .scan-panel{background:#fffdf8; border:1px solid rgba(232,222,210,.95); border-radius:22px; padding:14px; margin-bottom:14px; box-shadow:0 8px 22px rgba(92,64,34,.06);}
  .scan-title{font-size:13px; font-weight:850; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between;}
  .scan-title span{font-size:11px; color:var(--orange); background:#fff3df; border:1px solid #f2dfc4; border-radius:999px; padding:4px 8px;}
  .scan-row{display:flex; gap:8px; align-items:center; font-size:12px; color:#594838; padding:7px 0; border-top:1px solid rgba(232,222,210,.5);}
  .scan-row:first-of-type{border-top:0;}
  .scan-dot{width:7px; height:7px; border-radius:999px; background:var(--orange); box-shadow:0 0 0 4px rgba(217,119,6,.12); flex:none;}
  .intent-card{background:linear-gradient(180deg,#fffaf1,#fff); border:1px solid rgba(245,158,11,.38); border-radius:20px; padding:14px; margin-bottom:14px; box-shadow:0 10px 24px rgba(217,119,6,.10);}
  .intent-top{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px;}
  .intent-name{font-size:16px; font-weight:900; letter-spacing:-.03em;}
  .heat{font-size:12px; font-weight:900; color:#fff; background:linear-gradient(135deg,var(--orange),var(--orange2)); padding:6px 9px; border-radius:999px; box-shadow:0 6px 16px rgba(217,119,6,.18);}
  .heatbar{height:8px; border-radius:999px; background:#f0e3d2; overflow:hidden; margin:9px 0 10px;}
  .heatbar i{display:block; height:100%; width:var(--w); background:linear-gradient(90deg,var(--orange),var(--orange2)); border-radius:inherit;}
  .intent-motive{font-size:12px; color:#5c4a39; line-height:1.5; background:#fff7ea; border:1px solid #f0dfc8; padding:9px 10px; border-radius:14px;}
  .phone-note{font-size:11px; color:var(--muted); margin-bottom:9px; display:flex; justify-content:space-between; padding:0 3px;}
  .plan-section{margin-top:10px;}
  .plan-label{font-size:11px; color:var(--orange); font-weight:850; margin:10px 0 5px;}
  .chips{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{font-size:11px; color:#5b4938; background:#fff7ea; border:1px solid #f0dfc8; border-radius:999px; padding:6px 8px;}
  .output{font-size:12px; color:#3f3228; line-height:1.45; background:#f9efe0; border:1px solid #eddec8; border-radius:13px; padding:9px 10px; margin-top:7px; font-weight:650;}
  .quick-adjust{position:fixed; bottom:calc(74px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); width:100%; max-width:420px; padding:0 14px; z-index:24; display:flex; justify-content:flex-start; pointer-events:none;}
  .quick-adjust button{pointer-events:auto; border:1px solid #efd9ba; background:#fff8ed; color:#8a560b; border-radius:999px; padding:8px 11px; font-size:12px; font-weight:800; box-shadow:0 6px 14px rgba(92,64,34,.08);}
  .demo-control{position:fixed; top:calc(12px + env(safe-area-inset-top)); right:50%; transform:translateX(198px); z-index:40; display:flex; flex-direction:column; align-items:flex-end; gap:7px; pointer-events:none;}
  .demo-control button{pointer-events:auto; border:1px solid rgba(239,217,186,.95); background:rgba(255,248,237,.94); color:#8a560b; border-radius:999px; padding:8px 11px; font-size:11px; font-weight:900; box-shadow:0 8px 20px rgba(92,64,34,.12); backdrop-filter:blur(14px);}
  .demo-control button.running{background:linear-gradient(135deg,var(--orange),var(--orange2)); color:#fff; border-color:transparent;}
  .demo-status{display:none; max-width:238px; text-align:right; background:rgba(43,33,24,.82); color:#fff; border-radius:14px; padding:8px 10px; font-size:11px; line-height:1.35; box-shadow:0 10px 24px rgba(43,33,24,.18); backdrop-filter:blur(14px);}
  .demo-status.show{display:block; animation:rise .2s ease both;}
  .qr-mask{position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center; padding:22px; background:rgba(43,33,24,.38); backdrop-filter:blur(10px);}
  .qr-mask.show{display:flex; animation:fadeIn .18s ease both;}
  .qr-card{width:min(320px,92vw); background:#fffaf1; border:1px solid #efd9ba; border-radius:26px; padding:18px; box-shadow:0 26px 70px rgba(43,33,24,.24); color:var(--text); transition:width .22s ease, padding .22s ease, border-radius .22s ease;}
  .qr-head{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px;}
  .qr-title{font-size:17px; font-weight:950; letter-spacing:-.04em;}
  .qr-sub{font-size:12px; color:var(--muted); line-height:1.45; margin-top:4px;}
  .qr-close{border:0; background:#f4e6d2; color:#7b4b0a; width:30px; height:30px; border-radius:999px; font-weight:950; font-size:18px; line-height:30px;}
  .qr-box{background:#fff; border:1px solid #efe2cf; border-radius:22px; padding:14px; display:flex; justify-content:center; box-shadow:inset 0 0 0 6px #fffaf4; transition:padding .22s ease, border-radius .22s ease;}
  #qrImage{width:208px; height:208px; image-rendering:pixelated; display:block; transition:width .22s ease, height .22s ease;}
  .qr-url{margin:12px 0 10px; padding:9px 10px; border-radius:14px; background:#fff3df; border:1px solid #f1ddbf; color:#6f4a19; font-size:11px; line-height:1.35; word-break:break-all;}
  .qr-actions{display:flex; gap:8px; flex-wrap:wrap;}
  .qr-actions button{flex:1 1 30%; border:1px solid #ead2ad; background:#fff8ed; color:#8a560b; border-radius:14px; padding:10px 9px; font-size:12px; font-weight:900;}
  .qr-actions .primary{background:linear-gradient(135deg,var(--orange),var(--orange2)); color:#fff; border-color:transparent;}
  .qr-mask.fullscreen{padding:18px; background:radial-gradient(circle at top,#fff4df 0,#f4dfbf 34%,#2b2118 120%);}
  .qr-mask.fullscreen .qr-card{width:min(620px,96vw); min-height:min(760px,92vh); border-radius:34px; padding:24px; display:flex; flex-direction:column; justify-content:center;}
  .qr-mask.fullscreen .qr-title{font-size:28px; text-align:center;}
  .qr-mask.fullscreen .qr-sub{text-align:center; font-size:15px;}
  .qr-mask.fullscreen .qr-head{justify-content:center; position:relative;}
  .qr-mask.fullscreen .qr-close{position:absolute; right:0; top:0; width:38px; height:38px; line-height:38px; font-size:22px;}
  .qr-mask.fullscreen .qr-box{padding:22px; border-radius:30px; margin-top:8px;}
  .qr-mask.fullscreen #qrImage{width:min(420px,78vw,58vh); height:min(420px,78vw,58vh);}
  .qr-mask.fullscreen .qr-url{text-align:center; font-size:16px; padding:13px 14px; margin:16px 0 14px;}
  .qr-mask.fullscreen .qr-actions button{font-size:15px; padding:13px 12px;}
  .state-card{background:var(--card); border:1px solid rgba(232,222,210,.95); border-radius:24px; padding:18px 16px; margin:8px 0 14px; box-shadow:var(--shadow);}
  .state-emoji{width:54px; height:54px; border-radius:18px; display:flex; align-items:center; justify-content:center; background:#fff3df; font-size:26px; margin-bottom:12px;}
  .state-title{font-size:22px; line-height:1.18; letter-spacing:-.045em; font-weight:950; margin-bottom:8px;}
  .state-copy{font-size:13px; color:var(--muted); line-height:1.58; margin-bottom:13px;}
  .state-actions{display:flex; gap:9px; flex-wrap:wrap;}
  .state-actions button{flex:1 1 44%; border:none; border-radius:16px; padding:12px 10px; font-size:13px; font-weight:900;}
  .state-actions .primary{background:linear-gradient(135deg,var(--orange),var(--orange2)); color:#fff; box-shadow:0 8px 18px rgba(217,119,6,.18);}
  .state-actions .ghost{background:#fff7ea; color:#8a560b; border:1px solid #efd9ba;}
  .progress-head{background:linear-gradient(180deg,#fffdf8,#fff7ea); border:1px solid rgba(232,222,210,.95); border-radius:24px; padding:16px; margin:8px 0 12px; box-shadow:var(--shadow);}
  .progress-title{font-size:21px; font-weight:950; letter-spacing:-.045em; margin-bottom:7px;}
  .progress-copy{font-size:12px; color:var(--muted); line-height:1.55;}
  .progress-bar{height:10px; border-radius:999px; background:#f0e3d2; overflow:hidden; margin-top:13px;}
  .progress-bar i{display:block; height:100%; width:var(--progress,0%); background:linear-gradient(90deg,var(--orange),var(--orange2)); border-radius:inherit; transition:width .18s ease;}
  .task-list{display:grid; gap:10px; margin-top:10px;}

function normalizePayload(payload){
  const source = payload || DEMO_DATA;
  return {
    favorites: Array.isArray(source.favorites) ? source.favorites.map(normalizeFavoriteItem) : [],
    signal: normalizeIntentSignal(source.signal || {}),
    plans: {
      main: normalizePlanData(source.plans && source.plans.main),
      adjusted: normalizePlanData(source.plans && source.plans.adjusted)
    }
  };
}

function normalizeFavoriteItem(item){
  return {
    id: String(item.id || crypto.randomUUID?.() || Math.random().toString(36).slice(2)),
    icon: item.icon || '收',
    title: item.title || '未命名收藏',
    cat: item.cat || item.category || '未分类',
    saved: item.saved || item.saved_at || '刚刚',
    motivation: item.motivation || item.reason || '',
    callback: item.callback || '',
    key_points: Array.isArray(item.key_points) ? item.key_points : []   // 透传"视频独有干货"喂给 Prompt
  };
}

function normalizeIntentSignal(signal){
  return {
    cat: signal.cat || signal.category || '周末露营',
    count: Number(signal.count || 0),
    heat: Math.max(0, Math.min(100, Number(signal.heat || 0))),
    motivation: signal.motivation || '信息缺失：缺少收藏动机。',
    msg: signal.msg || signal.message || '信息缺失：缺少搭子提醒文案。',
    evidence: signal.evidence || '信息缺失：缺少判断依据。'
  };
}

function normalizePlanData(plan){
  const fallback = DEMO_DATA.plans.main;
  const src = plan || fallback;
  return {
    title: src.title || '用得上的计划',
    based_on: src.based_on || src.basedOn || '信息缺失：缺少来源说明。',
    days: Array.isArray(src.days) ? src.days.map(normalizePlanDay) : fallback.days.map(normalizePlanDay)
  };
}

  return {

function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function findItemBySourceName(name){
  const normalized = String(name || '').replace(/\s+/g,'');
  return getFavorites().find(it => {
    const title = it.title.replace(/\s+/g,'');
    return title.includes(normalized) || normalized.includes(title) || title.slice(0,6) === normalized.slice(0,6);
  });
}
function renderSourceTags(fromText){
  const names = [...String(fromText || '').matchAll(/「([^」]+)」/g)].map(m=>m[1]);
  if(!names.length) return escapeHtml(fromText || '出处：收藏夹');
  return '▶ 出自你抖音收藏的：' + names.map(name => {
    const item = findItemBySourceName(name);
    const target = item ? item.id : '';
    return `<button class="source-tag" type="button" onclick="jumpToCollection('${target}')">${escapeHtml(name)}</button>`;
  }).join('');
}

}

  const fb = getMainPlan();

  const real = await callLLM(null);                // 后台真实生成（超时给足，约 35s）
  if(real && real !== fb && getCurrentView()==='view-deliverable'){
    renderPlan(real, {real:true});                 // 真功夫好了，平滑替换上来

async function doAdjust(){
  const input = document.getElementById('adjustInput');

  if(!v){
    showToast('先写一句你想怎么调整，比如：今天任务太多');

  const fb = getAdjustedPlan();

  const real = await callLLM(v);           // 后台真实调整（带上一版，只改该动的）
  if(real && real !== fb && getCurrentView()==='view-deliverable'){
    renderPlan(real, {adjusted:true, real:true});

  }else{

  setAdjustLoading(false);
}

function makeQrDataURL(text){
  try{
    if(typeof qrcode==='undefined') return '';           // 库没加载时退回占位
    const qr = qrcode(0,'M'); qr.addData(String(text)); qr.make();
    return qr.createDataURL(6, 12);                       // cellSize, margin → 约 200px，匹配弹窗
  }catch(e){ console.warn('[qr] 生成失败', e); return ''; }
}

/* ===================== AI 配置（自建中转 · OpenAI 兼容 · 主力 gpt-5.5）===================== */
const AI_CONFIG = {
  endpoint: 'https://api.handsfreeclub.com/h5api/v1/chat/completions',   // 自建中转的隔离跨域入口（CORS 已开，对生产 /v1/ 零影响）
  apiKey:   (typeof window!=='undefined' && window.SHIGUANG_AI_KEY) || '', // key 外置在 config.local.js（已 .gitignore，不进仓库）；没 key 自动走本地兜底、不暴露
  model:    'gpt-5.5'
};

/* 把 相关收藏（含每条视频"看过才知道"的独有干货）+ 情境 拼成 Prompt2，直接输出前端能用的结构（days） */
function buildPrompt2(items, intentCat, userContext, prevPlan){
  const list = items.map(i=>{
    const dg = (i.key_points && i.key_points.length) ? `；这条视频独有干货：${i.key_points.join('、')}` : '';
    return `- 《${i.title}》｜当时想：${i.motivation||'—'}${dg}`;
  }).join('\n');
  const base = prevPlan ? `\n这是上一版计划（请在此基础上"只改用户要动的部分"，其余天尽量原样保留，保持连续感）：\n${JSON.stringify(prevPlan)}\n` : '';
  return `你是产品「用得上」里的收藏转行动助手。把用户在「${intentCat}」上收藏的这些视频里的方法，整合成能直接照做的产物——不是总结视频，是把它变成行动。
情境：${userContext}${base}
相关收藏（每条都附了"看过这条才知道"的独有干货）：
${list}

只输出如下 JSON（不要任何多余文字、不要 markdown）：
{"title":"给产物起个让人想用的名字","based_on":"一句话点名用到哪几条收藏，并显性说明你跳过了哪些无关收藏（如沙雕动物 / 穿搭）","days":[{"d":"Day 1","th":"今天主题 · 约X小时","goal":"今天要达成的目标","videos":["要看的收藏标题"],"key_points":["关键动作，必须取自上面对应视频的独有干货，禁止写通用常识"],"template":"答题或执行模板","output":"今日产出","from":"出自你存的「某条视频」「另一条」"}]}
硬性要求：
1. 正好排 3 天，不多不少；
2. 出处自洽：每条 key_point 复述的方法，必须和同一天 from 点名的视频是同一件事，严禁张冠李戴；
3. key_points 要用上面给的"视频独有干货"，体现"只有看过你这条收藏才知道"，不能是任何 AI 都能说的通用应试话；
4. based_on 要显性点出你剔掉了哪些无关收藏（沙雕动物、穿搭），让"识别能力"看得见；
5. 这是"行前准备 1 天 + 两天一夜露营"：Day 1 为行前（备装备 / 订营地，约 1-2 小时），Day 2 到场扎营玩一整天，Day 3 收拾返程、默认轻；每天 th 标上大致时段；
6. from 用「」中文方括号包视频名，名字要和"相关收藏"里的标题一致。`;
}

/* ===================== 接 AI 的唯一入口（魔法核心）===================== */
const __planCache = {};
const __inflight  = {};
async function callLLM(userAdjust, opts={}){
  const intentCat   = getIntentSignal().cat;
  const items       = getFavorites().filter(i=>i.cat===intentCat);
  const userContext = userAdjust ? ('在上版计划基础上调整：'+userAdjust)
                                 : '想趁周末去露营，把这些攻略整合成两天一夜的露营计划 + 装备清单';
  const cacheKey    = userAdjust || '__main__';
  if(__planCache[cacheKey]) return __planCache[cacheKey];                 // 预热/已生成命中：直接秒出真·实时结果
  if(!AI_CONFIG.endpoint || !AI_CONFIG.apiKey){                           // 演示模式：无 key 走本地兜底、不暴露 key
    return userAdjust ? getAdjustedPlan() : getMainPlan();
  }
  if(__inflight[cacheKey]) return __inflight[cacheKey];                   // 同一请求已在飞（如预热）：复用，避免重复打
  const run = (async()=>{
    const prevPlan = userAdjust ? __planCache['__main__'] : null;        // 即兴调整把上一版喂回去，保持连续
    const ctrl = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), opts.timeout || (userAdjust ? 45000 : 55000)); // 真实生成约 35-42s，超时给足让它跑得完（前台已先秒出兜底，等得起）
    try{
      const res = await fetch(AI_CONFIG.endpoint, {
        method:'POST', signal: ctrl.signal,
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+AI_CONFIG.apiKey},
        body: JSON.stringify({ model:AI_CONFIG.model, temperature: userAdjust ? 0.3 : 0.5, // 调整更稳、主计划留点发挥
          messages:[{role:'user', content: buildPrompt2(items, intentCat, userContext, prevPlan)}] })
      });
      const data = await res.json();
      let text = (data.choices && data.choices[0] && data.choices[0].message.content) || '';
      text = text.replace(/```json|```/g,'').trim();                     // 去掉可能的 markdown 包裹
      const s = text.indexOf('{'), e = text.lastIndexOf('}');            // 抠出 JSON 主体，容忍前后噪声
      if(s>=0 && e>s) text = text.slice(s, e+1);
      const plan = normalizePlanData(JSON.parse(text));
      if(!plan.days || !plan.days.length) throw new Error('返回缺 days');
      plan.days.forEach(d=>{ if(d.from) d.from = d.from.replace(/[《》]/g,''); }); // 模型偶尔在「」里又套《》，清掉防穿帮
      __planCache[cacheKey] = plan;                                      // 缓存成功结果
      return plan;
    }catch(e){
      console.warn('[callLLM] 调用失败，用兜底计划：', e);
      return userAdjust ? getAdjustedPlan() : getMainPlan();             // ★兜底：API 挂了/超时 demo 也不翻车
    }finally{
      clearTimeout(timer);
    }
  })();
  __inflight[cacheKey] = run;
  try{ return await run; } finally { delete __inflight[cacheKey]; }
}

/* 页面加载即静默预生成主计划 + 高频调整热词，用户走到"生成计划/压一压"时秒出（无 key 时此函数空转、不报错）*/
async function prewarm(){

  }catch(e){ /* 预热失败无所谓，主路径有兜底 */ }
}
